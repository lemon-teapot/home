name: Deploy to staging

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy develop → stage.lemonteapot.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f0d1c42d139267dc9a4be598f22c78b7
          command: pages deploy . --project-name lemonteapot-stage --branch develop

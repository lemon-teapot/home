  <title>Lemon Teapot — Something warm is brewing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #120805;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
      padding: 1.5rem 1rem 2.5rem;
      overflow-x: hidden;
    }

    /* Page-level warm pulse from fire */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 18% 90%, #c85000 0%, transparent 60%);
      opacity: 0.08;
      pointer-events: none;
      animation: pageglow 2s ease-in-out infinite alternate;
    }
    @keyframes pageglow {
      from { opacity: 0.06; }
      to   { opacity: 0.13; }
    }

    .scene {
      width: 100%;
      max-width: 680px;
      filter: drop-shadow(0 8px 40px rgba(180,80,0,0.25));
    }

    .text-area {
      margin-top: 2rem;
      text-align: center;
      max-width: 480px;
    }
    .tagline {
      font-size: clamp(1.15rem, 3.5vw, 1.65rem);
      color: #d4a870;
      letter-spacing: 0.04em;
      margin-bottom: 0.55rem;
    }
    .subtitle {
      font-size: clamp(0.78rem, 2vw, 0.95rem);
      color: #7a5535;
      font-style: italic;
      line-height: 1.6;
    }
    .domain {
      margin-top: 1.2rem;
      font-size: 0.7rem;
      color: #4a3020;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-style: normal;
    }
  </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>

  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
  <title>Lemon Teapot — Something warm is brewing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #120805;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', Georgia, serif;
      padding: 1.5rem 1rem 3rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 45% at 18% 92%, #c85000 0%, transparent 60%);
      pointer-events: none;
      animation: pageglow 2.2s ease-in-out infinite alternate;
    }
    @keyframes pageglow { from { opacity: 0.07; } to { opacity: 0.15; } }

    .scene {
      width: 100%;
      max-width: 700px;
      filter: drop-shadow(0 10px 50px rgba(180,80,0,0.3));
    }

    .text-area {
      margin-top: 2rem;
      text-align: center;
      max-width: 500px;
    }
    .tagline {
      font-size: clamp(1.15rem, 3.5vw, 1.7rem);
      font-weight: 400;
      color: #d4a870;
      letter-spacing: -0.01em;
      margin-bottom: 0.6rem;
    }
    .subtitle {
      font-size: clamp(0.78rem, 2vw, 0.92rem);
      font-weight: 300;
      font-style: italic;
      color: #7a5535;
      line-height: 1.7;
    }
    .domain {
      margin-top: 1.3rem;
      font-size: 0.65rem;
      font-weight: 500;
      color: #4a3020;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-style: normal;
    }

    /* ── Sound button ── */
    #snd-btn {
      position: fixed;
      bottom: 1.4rem;
      right: 1.4rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #1c0e06;
      border: 1.5px solid #3a2010;
      color: #a07848;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      z-index: 100;
      outline: none;
    }
    #snd-btn:hover { background: #281508; border-color: #6a3820; color: #d4a060; }
    #snd-btn.on   { border-color: #7a4820; color: #d4a060; }
    #snd-btn svg  { width: 18px; height: 18px; }

    /* Fade-in hint */
    #snd-hint {
      position: fixed;
      bottom: 1.75rem;
      right: 4rem;
      background: #1c0e06cc;
      border: 1px solid #3a2010;
      color: #8a6035;
      font-size: 0.7rem;
      font-family: 'Inter', sans-serif;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      white-space: nowrap;
      animation: hint-fade 5s ease-out 0.8s both;
      pointer-events: none;
    }
    @keyframes hint-fade {
      0%   { opacity: 0; transform: translateX(6px); }
      15%  { opacity: 1; transform: translateX(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>

  <p class="subtitle">
    Outside it's grey and drizzly.<br>
    In here there's fire, blankets, and very good company.
  </p>

</div>

<script>
// ── Procedural Ambient Audio Engine ──────────────────────────────────
const Audio = {
  ctx: null,
  master: null,
  on: false,
  crackleTimer: null,

  start() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.setValueAtTime(0, this.ctx.currentTime);
    this.master.connect(this.ctx.destination);
    this.makeRain();
    this.makeFire();
    this.master.gain.linearRampToValueAtTime(1, this.ctx.currentTime + 2);
    this.on = true;
  },

  // Pink noise → bandpass → sounds like light rain on glass
  makeRain() {
    const sr  = this.ctx.sampleRate;
    const len = sr * 3;
    const buf = this.ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < len; i++) {
        const w = Math.random()*2-1;
        b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
        b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
        d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.09;
        b6=w*0.115926;
      }
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf; src.loop = true;

    const hp = this.ctx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=600;
    const lp = this.ctx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=5000;
    const bp = this.ctx.createBiquadFilter();
    bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=0.6;

    const g = this.ctx.createGain(); g.gain.value=0.32;

    src.connect(hp); hp.connect(lp); lp.connect(bp); bp.connect(g);
    g.connect(this.master);
    src.start();
  },

  // Brown noise + slow LFO modulation → fire rumble base
  makeFire() {
    const sr  = this.ctx.sampleRate;
    const len = sr * 4;
    const buf = this.ctx.createBuffer(2, len, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      let last=0;
      for (let i = 0; i < len; i++) {
        last = (last + 0.02*(Math.random()*2-1))/1.02;
        d[i] = last*3.5;
      }
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf; src.loop = true;

    const lp = this.ctx.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=600;

    // Slow amplitude flutter (fire breathing)
    const lfo = this.ctx.createOscillator();
    lfo.frequency.value=0.4;
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value=0.08;
    lfo.connect(lfoGain);

    const fireGain = this.ctx.createGain();
    fireGain.gain.value=0.22;
    lfoGain.connect(fireGain.gain);

    src.connect(lp); lp.connect(fireGain);
    fireGain.connect(this.master);
    src.start(); lfo.start();
    this.scheduleCrackle();
  },

  // Random wood crackle pops
  scheduleCrackle() {
    if (!this.on) return;
    const delay = 400 + Math.random()*2800;
    this.crackleTimer = setTimeout(() => {
      if (!this.on || !this.ctx || this.ctx.state==='suspended') {
        this.scheduleCrackle(); return;
      }
      const dur = 0.02 + Math.random()*0.06;
      const len = Math.floor(this.ctx.sampleRate * dur);
      const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i=0; i<len; i++) d[i]=(Math.random()*2-1)*(1-i/len)*(1-i/len);

      const src = this.ctx.createBufferSource();
      src.buffer = buf;
      const lp = this.ctx.createBiquadFilter();
      lp.type='lowpass'; lp.frequency.value=900;
      const g  = this.ctx.createGain();
      g.gain.value = 0.08 + Math.random()*0.18;

      src.connect(lp); lp.connect(g); g.connect(this.master);
      src.start();
      this.scheduleCrackle();
    }, delay);
  },

  toggle() {
    if (!this.ctx) { this.start(); return; }
    if (this.ctx.state==='suspended') {
      this.ctx.resume();
      this.master.gain.linearRampToValueAtTime(1, this.ctx.currentTime+0.6);
      this.on = true;
    } else {
      this.master.gain.linearRampToValueAtTime(0, this.ctx.currentTime+0.5);
      setTimeout(()=>{ if(this.ctx) this.ctx.suspend(); }, 600);
      this.on = false;
    }
  }
};

function toggleSound() {
  Audio.toggle();
  const btn   = document.getElementById('snd-btn');
  const iOff  = document.getElementById('ico-off');
  const iOn   = document.getElementById('ico-on');
  const isOn  = Audio.on;
  btn.classList.toggle('on', isOn);
  iOff.style.display = isOn ? 'none' : '';
  iOn.style.display  = isOn ? '' : 'none';
}
</script>

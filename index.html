  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src https://api.open-meteo.com https://api.bigdatacloud.net; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="/manifest.json">
  <title>Lemon Teapot — Something warm is brewing</title>
  <!-- Favicon: lemon teapot emoji as SVG data URI -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🫖</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,300&family=Lora:ital,wght@0,400;0,600;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #120805;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', Georgia, serif;
      padding: 1.5rem 1rem 3rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 45% at 18% 92%, #c85000 0%, transparent 60%);
      pointer-events: none;
      animation: pageglow 2.2s ease-in-out infinite alternate;
    }
    @keyframes pageglow { from { opacity: 0.07; } to { opacity: 0.15; } }

    .scene {
      width: 100%;
      max-width: 700px;
      filter: drop-shadow(0 10px 50px rgba(180,80,0,0.3));
    }

    .text-area {
      margin-top: 2rem;
      text-align: center;
      max-width: 500px;
    }
    .tagline {
      font-size: clamp(1.15rem, 3.5vw, 1.7rem);
      font-weight: 400;
      color: #d4a870;
      letter-spacing: -0.01em;
      margin-bottom: 0.6rem;
    }
    .subtitle {
      font-size: clamp(0.78rem, 2vw, 0.92rem);
      font-weight: 300;
      font-style: italic;
      color: #d4a870;
      line-height: 1.7;
    }
    .domain {
      margin-top: 1.3rem;
      font-size: 0.65rem;
      font-weight: 300;
      color: #d4a870;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      font-style: normal;
    }

    /* ── Curtain panels ── */
    #curtain-close-l, #curtain-close-r {
      transition: transform 0.8s cubic-bezier(0.4,0,0.6,1), opacity 0.5s 0.5s;
      cursor: pointer;
    }
    #curtain-open-l, #curtain-open-r {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s 0.8s;
      cursor: pointer;
    }

    /* ── Sound toggle button ── */
    #snd-btn {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1rem 0.45rem 0.75rem;
      background: #1c0e06ee;
      border: 1.5px solid #4a2c10;
      border-radius: 24px;
      color: #c8a060;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      z-index: 200;
      outline: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #snd-btn:hover { background: #281808ee; border-color: #7a4820; color: #e0b870; }
    #snd-btn.muted { color: #5a3a20; border-color: #2a1808; }
    #snd-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    #snd-label { white-space: nowrap; }

    /* LED display always visible */
    #music-display { cursor: pointer; }
    /* Musical note blinker pulse */
    #note-blinker, #note-off-line {
      animation: note-pulse 3s ease-in-out infinite;
    }
    @keyframes note-pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    /* Fade-in curtain hint */
    #curtain-hint-text {
      animation: hint-fade 7s ease-out 1.5s both;
      pointer-events: none;
    }
    @keyframes hint-fade {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Notebook popup ─────────────────────────────────────────── */
    #book-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(8,4,2,0.92); z-index: 500;
      align-items: center; justify-content: center;
    }
    #book-overlay.open { display: flex; }
    .nb-wrap {
      position: relative; display: flex; align-items: stretch;
      filter: drop-shadow(0 18px 52px rgba(0,0,0,0.8));
    }
    .nb-rings {
      width: 26px; background: #3a3028; border-radius: 6px 0 0 6px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-evenly; padding: 14px 0; flex-shrink: 0;
    }
    .nb-ring {
      width: 17px; height: 17px; border-radius: 50%;
      background: #1e1810; border: 2px solid #5a4a38;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
    }
    .nb-page {
      width: min(420px, 80vw); height: min(580px, 84vh);
      background: #f0e6ca;
      background-image: repeating-linear-gradient(
        transparent, transparent 20px,
        rgba(180,150,100,0.22) 20px, rgba(180,150,100,0.22) 21px,
        transparent 21px, transparent 32px
      );
      background-position-y: 4px; /* baseline sits 3px above each stripe */
      border-radius: 0 4px 4px 0;
      padding: 2rem 2.2rem 3rem 1.8rem;
      position: relative; overflow: hidden;
      box-shadow: inset -3px 0 8px rgba(0,0,0,0.1);
    }
    /* Top-left dog-ear = previous chapter */
    .nb-prev {
      position: absolute; top: 0; left: 0; width: 0; height: 0;
      border-style: solid; border-width: 40px 40px 0 0;
      border-color: #d4c8a0 transparent transparent transparent;
      cursor: pointer; z-index: 10;
      filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.25));
      transition: border-width 0.15s;
    }
    .nb-prev:hover { border-width: 50px 50px 0 0; }
    .nb-prev.dim    { opacity: 0.25; cursor: default; }
    /* Bottom-right dog-ear = next chapter */
    .nb-next {
      position: absolute; bottom: 0; right: 0; width: 0; height: 0;
      border-style: solid; border-width: 0 0 44px 44px;
      border-color: transparent transparent #d4c8a0 transparent;
      cursor: pointer; z-index: 10;
      filter: drop-shadow(-1px -1px 2px rgba(0,0,0,0.25));
      transition: border-width 0.15s;
    }
    .nb-next:hover { border-width: 0 0 56px 56px; }
    .nb-next.dim    { opacity: 0.25; cursor: default; }
    /* Page content — scrollable so text is never cut off */
    .nb-content {
      font-family: 'Lora', Georgia, serif;
      font-size: 1rem; color: #3a2a14; line-height: 32px;
      height: calc(100% - 2.6rem);
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #c8a870 transparent;
      margin-right: -1rem;          /* push scrollbar toward right page edge */
      padding-right: calc(1rem + 6px); /* keep text inset; scrollbar in the extra space */
    }
    .nb-content::-webkit-scrollbar { width: 4px; }
    .nb-content::-webkit-scrollbar-track { background: transparent; }
    .nb-content::-webkit-scrollbar-thumb {
      background: rgba(180,140,80,0.45);
      border-radius: 2px;
    }
    .nb-content h2 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.1rem; letter-spacing: 0.08em; text-transform: uppercase;
      font-weight: 600; color: #2a1a08;
      margin: 0; line-height: 32px;
      /* no border-bottom or padding-bottom — ruled line serves as separator */
    }
    .nb-content p  { margin-bottom: 0; } /* blank <p>&nbsp;</p> used for gaps */
    .nb-content ul { padding-left: 1.2em; }
    .nb-content li { margin-bottom: 0.3rem; }
    .nb-content a  { color: #7a4010; }
    .nb-content table { border-collapse: collapse; font-size: 0.78rem; width: 100%; }
    .nb-content td, .nb-content th {
      border: 1px solid #c8a870; padding: 0.25rem 0.5rem; text-align: left;
    }
    .nb-content th { background: rgba(180,140,80,0.12); }
    /* Credits chapter */
    .nb-credits-wrap { text-align: center; padding-top: 1.5rem; }
    .nb-credits-name {
      font-family: 'Pinyon Script', cursive;
      font-size: 3.2rem; color: #2a1a08; line-height: 1.1;
    }
    .nb-credits-latin {
      font-family: Georgia, serif; font-style: italic;
      font-size: 0.72rem; color: #7a6040; margin-top: 0.5rem;
      letter-spacing: 0.06em;
    }
    .nb-credits-divider {
      border: none; border-top: 1px solid #c8a870;
      width: 50%; margin: 1.2rem auto 1rem;
    }
    /* Footer */
    .nb-footer {
      position: absolute; bottom: 0.7rem; left: 50%;
      transform: translateX(-50%);
      font-family: Georgia, serif; font-size: 0.63rem;
      color: #a08050; letter-spacing: 0.14em; white-space: nowrap;
    }
    .nb-close {
      position: absolute; top: -2.2rem; right: 0;
      background: none; border: none; color: #c8a060;
      font-size: 1.1rem; cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .nb-close:hover { color: #e0c880; }
    /* Dog-ear pulse — draws attention on mobile */
    @keyframes crease-pulse {
      0%, 70%, 100% { opacity: 0.75; }
      35%            { opacity: 1; }
    }
    .nb-next:not(.dim) { animation: crease-pulse 2.5s ease-in-out infinite; }
    .nb-prev:not(.dim) { animation: crease-pulse 2.5s ease-in-out infinite 1.2s; }
  </style>
</head>

<script>
// ── Audio ──────────────────────────────────────────────────────────────
// Piano MP3 playlist: ALWAYS playing once started (50% vol)
// Rain MP3: layers on top when curtain is open (25% vol)
// Piano: 50% vol · Rain: 12.5% vol (curtain open only) · no Web Audio API

// No Web Audio API needed — all audio uses native HTML5 elements
let muted = false, curtainIsOpen = false, audioStarted = false;
let pianoEl = null, rainEl = null;

// Must be declared before buildTicker() is first called
const DAYS        = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const FULL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let weatherCity = '...', weatherTemp = '--', weatherCode = 0, weatherFetching = false;

function getWeatherIcon(code) {
  if (code === 0)          return '☀';  // ☀ clear
  if (code <= 2)           return '⛅';  // ⛅ partly cloudy
  if (code <= 3)           return '☁';  // ☁ overcast
  if (code <= 48)          return '≈';  // ≈ fog
  if (code <= 67)          return '⛆';  // ⛆ rain
  if (code <= 77)          return '❄';  // ❄ snow
  if (code <= 82)          return '⛆';  // ⛆ showers
  if (code <= 86)          return '❄';  // ❄ snow showers
  return '⚡';                           // ⚡ thunderstorm
}

// ── Playlist ──────────────────────────────────────────────────────────
// ── PLAYLIST — add new Suno tracks here ──────────────────────────────
// 1. Drop the .mp3 into this folder  2. Add a line below  3. git push
const TRACKS = [
  { file:'music/cloud-veil-1.mp3',       name:'Cloud Veil I'       },
  { file:'music/cloud-veil-2.mp3',       name:'Cloud Veil II'      },
  { file:'music/rain-on-glass-1.mp3',    name:'Rain on Glass I'    },
  { file:'music/rain-on-glass-2.mp3',    name:'Rain on Glass II'   },
  { file:'music/soft-pedal-drift-1.mp3', name:'Soft Pedal Drift I' },
  { file:'music/soft-pedal-drift-2.mp3', name:'Soft Pedal Drift II'},
  // { file:'new-track.mp3',  name:'New Track'     },  ← add more here
];
let playlist = [...TRACKS], trackIdx = 0;

function shuffle(arr) {
  for (let i=arr.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

// ── Fire crackle (always, very subtle) ───────────────────────────────

// ── MP3 playlist controls ─────────────────────────────────────────────
function loadTrack(idx) {
  if (!pianoEl) return;
  pianoEl.src = playlist[idx].file;
  pianoEl.play().catch(()=>{});
  updatePlayerUI();
  syncMediaSession();
}

function nextTrack() {
  trackIdx++;
  if (trackIdx >= playlist.length) { trackIdx=0; shuffle(playlist); }
  loadTrack(trackIdx);
}

function skipTrack() {
  if (!audioStarted || !pianoEl) return;
  pianoEl.pause();
  nextTrack();
}

// ── Non-overlapping segment ticker ────────────────────────────────────
// Each segment scrolls fully off-screen left before the next enters from right.
// Uses getComputedTextLength() for accurate per-segment width measurement.

let tickerRaf      = null;
let tickerX        = 154;   // current scroller translate (154 = off-screen right)
let tickerSegIdx   = 0;
let tickerSegs     = [];
let tickerSegWidth = 200;   // rendered px width of current segment

function buildSegments() {
  const now    = new Date();
  const day    = DAYS[now.getDay()];
  const date   = now.getDate() + ' ' + FULL_MONTHS[now.getMonth()] + ' ' + now.getFullYear();
  const noLoc  = ['...','No location','Location off','No permission','Unavailable'];
  const hasLoc = weatherCity && !noLoc.includes(weatherCity);
  const track  = audioStarted ? (playlist[trackIdx]?.name || '---') : '♪  Click to Play';
  const segs   = [track];
  if (hasLoc) segs.push(weatherCity + ' ' + getWeatherIcon(weatherCode) + ' ' + weatherTemp + '°C');
  segs.push(day + ', ' + date);
  return segs;
}

function loadSegment(idx) {
  tickerSegs = buildSegments();
  if (!tickerSegs.length) return; // nothing to display
  tickerSegIdx = ((idx % tickerSegs.length) + tickerSegs.length) % tickerSegs.length;
  const textEl = document.getElementById('display-text');
  if (!textEl) return;
  textEl.textContent = tickerSegs[tickerSegIdx];
  // getComputedTextLength() forces SVG layout → exact rendered width
  tickerSegWidth = (typeof textEl.getComputedTextLength === 'function')
    ? (textEl.getComputedTextLength() || textEl.textContent.length * 8.2)
    : textEl.textContent.length * 8.2;
}

function tickerStep(t) {
  tickerStep._last = tickerStep._last || t;
  const dt = Math.min((t - tickerStep._last) / 1000, 0.05);
  tickerStep._last = t;
  tickerX -= 22 * dt;

  // Current segment fully off screen left → load next segment from right
  if (tickerX < -(tickerSegWidth + 30)) {
    tickerX = 154;
    loadSegment(tickerSegIdx + 1);
  }

  const el = document.getElementById('display-scroller');
  if (el) el.setAttribute('transform', 'translate(' + tickerX.toFixed(1) + ',0)');
  tickerRaf = requestAnimationFrame(tickerStep);
}

function startTicker() {
  if (tickerRaf) cancelAnimationFrame(tickerRaf);
  tickerStep._last = null;
  tickerX = 154; // enter from right
  loadSegment(0);
  tickerRaf = requestAnimationFrame(tickerStep);
}

function updatePlayerUI() {
  startTicker(); // restart from segment 0 (shows new track name immediately)
}

// Clicking the note / LED display: start audio on first touch, then toggle mute
function onLEDClick() {
  if (!audioStarted) { onFirstInteraction(); } else { toggleSound(); }
}
// Clicking the chevron: start audio on first touch, then skip track
// ── Volume helpers (native HTML5 Audio — no Web Audio dependency) ────
function setVolumes() {
  const m = muted ? 0 : 1;
  if (pianoEl) pianoEl.volume = m * 0.5;
  if (rainEl)  rainEl.volume  = m * (curtainIsOpen ? 0.125 : 0);
}

function fadeVolume(el, fromVol, toVol, ms) {
  if (!el) return;
  el.volume = Math.max(0, Math.min(1, fromVol));
  const steps = 30, stepMs = ms / steps;
  const diff = (toVol - fromVol) / steps;
  let n = 0;
  const t = setInterval(() => {
    n++;
    el.volume = Math.max(0, Math.min(1, fromVol + diff * n));
    if (n >= steps) clearInterval(t);
  }, stepMs);
}

function skipOrStart(e) {
  e.stopPropagation(); // prevent bubbling to onLEDClick (which would toggle mute)
  if (!audioStarted) { onFirstInteraction(); } else { skipTrack(); }
}

// ── Sound button state ────────────────────────────────────────────────
function updateSoundBtn() {
  const isOn  = audioStarted && !muted;
  const btn   = document.getElementById('snd-btn');
  if (!btn) return;
  btn.classList.toggle('muted', !isOn);
  document.getElementById('snd-label').textContent = isOn ? 'Sound on' : 'Sound off';
  document.getElementById('ico-on').style.display  = isOn ? '' : 'none';
  document.getElementById('ico-off').style.display = isOn ? 'none' : '';
  // Musical note state: show diagonal off-line when sound is off
  const offLine = document.getElementById('note-off-line');
  if (offLine) offLine.style.display = isOn ? 'none' : '';
  syncMediaSession();
}

// ── Init audio ────────────────────────────────────────────────────────
function initAudio() {
  if (audioStarted) return;
  audioStarted = true;

  // Piano MP3 — native HTML5 Audio (survives screen lock)
  pianoEl = new Audio();
  pianoEl.volume = muted ? 0 : 0.5;
  pianoEl.addEventListener('ended', nextTrack);
  shuffle(playlist); trackIdx = 0;
  loadTrack(trackIdx);

  // Rain MP3 — native HTML5 Audio
  rainEl = new Audio('music/rain.mp3');
  rainEl.loop = true;
  rainEl.volume = (curtainIsOpen && !muted) ? 0.125 : 0;
  if (curtainIsOpen) rainEl.play().catch(()=>{});

  updatePlayerUI();
  updateSoundBtn();
}

// ── Curtain: open ─────────────────────────────────────────────────────
function openCurtain() {
  if (curtainIsOpen) return;
  curtainIsOpen = true;

  const cl=document.getElementById('curtain-close-l');
  const cr=document.getElementById('curtain-close-r');
  cl.style.transform='translateX(-108px)'; cl.style.opacity='0'; cl.style.pointerEvents='none';
  cr.style.transform='translateX(108px)';  cr.style.opacity='0'; cr.style.pointerEvents='none';
  const seam=document.getElementById('curtain-seam');
  const hint=document.getElementById('curtain-hint-text');
  if (seam){seam.style.transition='opacity 0.5s';seam.style.opacity='0';}
  if (hint) hint.style.display='none';
  const ol=document.getElementById('curtain-open-l');
  const or_=document.getElementById('curtain-open-r');
  if (ol) {ol.style.transition='';ol.style.opacity='1';ol.style.pointerEvents='auto';}
  if (or_){or_.style.transition='';or_.style.opacity='1';or_.style.pointerEvents='auto';}

  if (!audioStarted) { initAudio(); return; }
  // Fade rain in via native volume — piano uninterrupted, survives screen lock
  if (rainEl) { rainEl.play().catch(()=>{}); fadeVolume(rainEl, 0, muted ? 0 : 0.125, 1200); }
  updatePlayerUI();
}

// ── Curtain: close ────────────────────────────────────────────────────
function closeCurtain() {
  if (!curtainIsOpen) return;
  curtainIsOpen = false;

  const ol=document.getElementById('curtain-open-l');
  const or_=document.getElementById('curtain-open-r');
  if (ol) {ol.style.transition='opacity 0.35s 0s';ol.style.opacity='0';ol.style.pointerEvents='none';}
  if (or_){or_.style.transition='opacity 0.35s 0s';or_.style.opacity='0';or_.style.pointerEvents='none';}
  setTimeout(()=>{
    const cl=document.getElementById('curtain-close-l');
    const cr=document.getElementById('curtain-close-r');
    cl.style.transform='translateX(0)';cl.style.opacity='1';cl.style.pointerEvents='auto';
    cr.style.transform='translateX(0)';cr.style.opacity='1';cr.style.pointerEvents='auto';
    const seam=document.getElementById('curtain-seam');
    if(seam)seam.style.opacity='0.7';
  },250);

  if (!audioStarted) return;
  // Fade rain out via native volume
  if (rainEl) fadeVolume(rainEl, rainEl.volume, 0, 1200);
  setTimeout(() => { if (rainEl && !curtainIsOpen) rainEl.pause(); }, 1400);
  updatePlayerUI();
}

// ── Sound toggle ──────────────────────────────────────────────────────
function toggleSound() {
  if (!audioStarted) { initAudio(); return; }
  muted = !muted;
  setVolumes();
  updateSoundBtn();
}

// ── Start on first user interaction ──────────────────────────────────
function onFirstInteraction(){if(!audioStarted)initAudio();}
document.addEventListener('click',      onFirstInteraction,{once:true,passive:true});
document.addEventListener('touchstart', onFirstInteraction,{once:true,passive:true});

// Populate LED display + set button to "off" on page load
updatePlayerUI();
updateSoundBtn();

// ── Clock updates every second ─────────────────────────────────────────

function updateClock() {
  const now = new Date();
  const h   = now.getHours() % 12 + now.getMinutes() / 60;
  const m   = now.getMinutes() + now.getSeconds() / 60;
  const s   = now.getSeconds();
  const cx = 133, cy = 115; // group-local coords (translate wrapper shifts -8px visually)

  function hand(id, deg, r) {
    const el = document.getElementById(id);
    if (!el) return;
    const rad = (deg - 90) * Math.PI / 180;
    el.setAttribute('x2', (cx + r * Math.cos(rad)).toFixed(2));
    el.setAttribute('y2', (cy + r * Math.sin(rad)).toFixed(2));
  }
  function tail(id, deg, r) {
    const el = document.getElementById(id);
    if (!el) return;
    const rad = (deg + 90) * Math.PI / 180;
    el.setAttribute('x2', (cx + r * Math.cos(rad)).toFixed(2));
    el.setAttribute('y2', (cy + r * Math.sin(rad)).toFixed(2));
  }
  hand('clock-hour',   h * 30, 18);
  hand('clock-minute', m * 6,  23);
  hand('clock-second', s * 6,  26);
  tail('clock-second-tail', s * 6, 7);

  // (clock only — ticker is updated on track change and weather fetch)
}
setInterval(updateClock, 1000);
updateClock();

// Weather: fetches once on load, refreshes every 30 minutes
async function fetchWeather() {
  if (weatherFetching) return; // prevent overlapping requests
  if (!navigator.geolocation) {
    weatherCity = 'Location off'; weatherTemp = '--';
    return;
  }
  weatherFetching = true;
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const { latitude: lat, longitude: lon } = pos.coords;
      const [geoRes, wxRes] = await Promise.all([
        fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`),
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
      ]);
      const geo = await geoRes.json();
      const wx  = await wxRes.json();
      weatherCity = (geo.city || geo.locality || geo.principalSubdivision || 'Unknown').slice(0, 18);
      weatherTemp = Math.round(wx.current_weather.temperature);
      weatherCode = wx.current_weather.weathercode || 0;
    } catch(e) {
      weatherCity = 'Unavailable'; weatherTemp = '--';
    }
    weatherFetching = false;
    // No restart needed — loadSegment() calls buildSegments() fresh at each transition
  }, () => {
    weatherCity = 'No location'; weatherTemp = '--';
    weatherFetching = false;
  }, { timeout: 8000 });
}
fetchWeather();
setInterval(fetchWeather, 30 * 60 * 1000); // refresh every 30 minutes

// ── Service Worker (offline / airplane mode support) ──────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── Toggle curtain (window click zone calls this) ─────────────────
function toggleCurtain() {
  curtainIsOpen ? closeCurtain() : openCurtain();
}

// ── Media Session API (keeps audio playing when screen locks) ─────
function syncMediaSession() {
  if (!('mediaSession' in navigator)) return;
  const track = playlist[trackIdx];
  navigator.mediaSession.metadata = new MediaMetadata({
    title: track?.name || 'Lemon Teapot',
    artist: 'Lemon Teapot',
    album: 'Ambient Piano'
  });
  navigator.mediaSession.playbackState = (audioStarted && !muted) ? 'playing' : 'paused';
  navigator.mediaSession.setActionHandler('play',      () => { if (muted) toggleSound(); });
  navigator.mediaSession.setActionHandler('pause',     () => { if (!muted) toggleSound(); });
  navigator.mediaSession.setActionHandler('nexttrack', skipTrack);
}


// ── Notebook popup ────────────────────────────────────────────────
let bookPage = 0;

// Page 1: description + first 4 tracks. Overflow onto further pages automatically.
function musicTableChapters() {
  const items = TRACKS.map(t =>
    `<li><a href="https://github.com/lemon-teapot/home/raw/main/${t.file}">${t.name}</a></li>`
  ).join('');
  return [{ title: 'Music',
    html: `<p>&nbsp;</p><p>Six pieces generated with <a href="https://suno.com">suno.com</a>, a mix of solo piano and piano with strings arrangements. No copyright attached. Take them, use them, do whatever you like.</p><p>&nbsp;</p><ul>${items}</ul><p>&nbsp;</p><p>The rain track is from a free sound library.</p>`
  }];
}

const BOOK_CHAPTERS = [

function openBook() {
  bookPage = 0;
  document.getElementById('book-overlay').classList.add('open');
  renderBook();
}
function closeBook() {
  document.getElementById('book-overlay').classList.remove('open');
}
function closeBookOutside(e) {
  if (e.target.id === 'book-overlay') closeBook();
}
function flipBook(dir) {
  const next = bookPage + dir;
  if (next < 0 || next >= BOOK_CHAPTERS.length) return;
  bookPage = next;
  renderBook();
}
function renderBook() {
  const ch = BOOK_CHAPTERS[bookPage];
  document.getElementById('nb-content').innerHTML = (ch.noTitle ? '' : `<h2>${ch.title}</h2>`) + ch.html;
  document.getElementById('nb-footer').textContent =
    `${bookPage + 1}  /  ${BOOK_CHAPTERS.length}`;
  document.querySelector('.nb-prev').classList.toggle('dim', bookPage === 0);
  document.querySelector('.nb-next').classList.toggle('dim', bookPage === BOOK_CHAPTERS.length - 1);
}
</script>

<!-- ── Notebook popup ── -->
<div id="book-overlay" onclick="closeBookOutside(event)" role="dialog" aria-modal="true">
  <div class="nb-wrap">
    <!-- Spiral rings -->
    <div class="nb-rings" aria-hidden="true">
      <div class="nb-ring"></div><div class="nb-ring"></div>
      <div class="nb-ring"></div><div class="nb-ring"></div>
      <div class="nb-ring"></div><div class="nb-ring"></div>
      <div class="nb-ring"></div><div class="nb-ring"></div>
      <div class="nb-ring"></div><div class="nb-ring"></div>
      <div class="nb-ring"></div>
    </div>
    <!-- Notebook page -->
    <div class="nb-page">
      <div class="nb-prev" onclick="flipBook(-1)" title="Previous chapter"></div>
      <div class="nb-content" id="nb-content"></div>
      <div class="nb-footer"  id="nb-footer"></div>
      <div class="nb-next" onclick="flipBook(1)"  title="Next chapter"></div>
    </div>
    <button class="nb-close" onclick="closeBook()" aria-label="Close">✕</button>
  </div>
</div>
